<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AlphaFold DB — 2,597,930 structural cluster representatives</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #0a0a12;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    #title {
      position: fixed;
      top: 12px;
      left: 12px;
      padding: 6px 10px;
      border-radius: 6px;
      background: rgba(14, 14, 18, 0.7);
      border: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-size: 14px;
      letter-spacing: 0.4px;
      z-index: 120;
    }
    /* Legend (rendered inside color panel) */
    #legend-title { font-weight: 600; margin-bottom: 6px; }
    .legend-gradient { height: 10px; border-radius: 4px; border: 1px solid #fff; }
    .legend-range { display: flex; justify-content: space-between; font-size: 11px; margin-top: 4px; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin: 2px 0; }
    .legend-swatch { width: 12px; height: 12px; border-radius: 3px; border: 1px solid #fff; }
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      color: #e0e0e0;
      width: 240px;
      display: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      z-index: 130;
    }
    #tooltip.visible { display: block; }
    #tooltip .label { font-weight: 700; margin-bottom: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #tooltip .row { display: flex; justify-content: space-between; gap: 12px; margin: 2px 0; }
    #tooltip .key { color: #9ca3af; flex-shrink: 0; }
    #tooltip .value { color: #e5e7eb; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    #loading {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0a0a12;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    #loading.hidden { display: none; }
    #loading-text { font-size: 18px; margin-bottom: 20px; }
    #progress-bar { width: 300px; height: 8px; background: rgba(255,255,255,0.2); border-radius: 4px; overflow: hidden; }
    #progress-fill { height: 100%; background: #4a9eff; width: 0%; transition: width 0.2s; }
    #progress-text { margin-top: 10px; font-size: 14px; color: #9ca3af; }

    /* Card stack - pinned cards from single clicks */
    #card-stack {
      position: fixed;
      top: 52px;
      left: 12px;
      z-index: 100;
      --card-width: 320px;
      --card-body-max-height: 420px;
    }
    #card-stack.hidden { display: none; }
    .card {
      width: var(--card-width);
      background: rgba(14, 14, 18, 0.86);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 12px;
      color: #e0e0e0;
      font-size: 12px;
      box-shadow: 0 12px 32px rgba(0,0,0,0.5);
      position: relative;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
    }
    .card-resize-handle {
      position: absolute;
      right: -2px;
      bottom: -2px;
      width: 16px;
      height: 16px;
      cursor: nwse-resize;
      z-index: 2;
      touch-action: none;
    }
    .card-resize-handle::before {
      content: "";
      position: absolute;
      right: 3px;
      bottom: 3px;
      width: 9px;
      height: 9px;
      border-radius: 999px;
      border-right: 2px solid rgba(255, 255, 255, 0.28);
      border-bottom: 2px solid rgba(255, 255, 255, 0.28);
    }
    .card-resize-handle:hover::before {
      border-right-color: rgba(74, 158, 255, 0.95);
      border-bottom-color: rgba(74, 158, 255, 0.95);
    }
    body.card-resizing {
      cursor: nwse-resize;
      user-select: none;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 1px solid #333;
    }
    .card-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #9ca3af;
    }
    .card-nav button {
      background: #333;
      border: 1px solid #555;
      color: #fff;
      width: 22px;
      height: 22px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      padding: 0;
    }
    .card-nav button:hover { background: #444; }
    .card-nav button:disabled { opacity: 0.3; cursor: not-allowed; }
    .card-close {
      background: transparent;
      border: none;
      color: #666;
      font-size: 18px;
      cursor: pointer;
      padding: 0 0 0 8px;
      line-height: 1;
    }
    .card-close:hover { color: #fff; }
    .card-minimize {
      background: transparent;
      border: none;
      color: #666;
      font-size: 14px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    .card-minimize:hover { color: #fff; }
    .card.minimized .card-body { display: none; }
    .card.minimized { padding: 8px 12px; }
    .card.minimized .card-header { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .card-body {
      overflow-y: auto;
      max-height: var(--card-body-max-height);
      padding-right: 2px;
    }
    .card-label {
      font-weight: 700;
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
    }
    .card-row .key { color: #9ca3af; flex-shrink: 0; font-size: 11px; }
    .card-row .value {
      color: #e5e7eb;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
      flex: 1;
      text-align: right;
    }
    .card-copy-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 4px 0;
      background: #1a1a1a;
      padding: 6px 8px;
      border-radius: 4px;
    }
    .card-copy-row .key { color: #9ca3af; flex-shrink: 0; font-size: 11px; }
    .card-copy-row .value {
      color: #e5e7eb;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
      flex: 1;
      font-family: monospace;
      font-size: 11px;
    }
    .card-copy-btn {
      background: #4a9eff;
      border: none;
      color: #fff;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 10px;
      flex-shrink: 0;
      font-weight: 500;
    }
    .card-copy-btn:hover { background: #3a8eef; }
    .card-copy-btn.copied { background: #22c55e; }
    /* Structure rendering for SMILES tooltips and cards */
    #tooltip .structure-container {
      width: 240px;
      height: 200px;
      background: #fff;
      border-radius: 4px;
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #tooltip .structure-container.hidden { display: none; }
    #tooltip #structure-svg { width: 240px; height: 200px; }
    .card .card-structure-container {
      display: flex;
      width: 100%;
      height: 200px;
      background: #fff;
      border-radius: 4px;
      margin-bottom: 8px;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }
    .card .card-structure-container.hidden { display: none; }
    .card #card-structure-svg { width: 100%; height: 200px; }
    /* Image rendering for tooltips and cards */
    #tooltip .image-container {
      margin-top: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #tooltip .image-container.hidden { display: none; }
    #tooltip .image-container img {
      image-rendering: pixelated;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.3);
    }
    .card .card-image-container {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }
    .card .card-image-container.hidden { display: none; }
    .card .card-image-container img {
      image-rendering: pixelated;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.3);
    }

    /* Protein / 3D structure viewer in cards */
    .card .card-structure-container .structure-loading {
      color: #666;
      font-size: 11px;
    }
    .card .card-structure-container .structure-error {
      color: #888;
      font-size: 11px;
      text-align: center;
      padding: 8px;
    }
    .card .card-structure-container .viewer-3d {
      width: 100%;
      height: 100%;
    }
    .uniprot-link {
      color: #4a9eff;
      text-decoration: none;
    }
    .uniprot-link:hover { text-decoration: underline; }
    .protein-meta-row {
      display: flex;
      gap: 4px;
      font-size: 11px;
      color: #ccc;
      padding: 2px 0;
    }
    .protein-meta-row .meta-key { color: #888; min-width: 60px; }
    .protein-meta-row .meta-val { color: #e0e0e0; word-break: break-word; }

    /* Export panel - bottom-left */
    #export-panel {
      position: fixed;
      bottom: 68px;
      left: 12px;
      background: rgba(0, 0, 0, 0.9);
      border: 1px solid #444;
      border-radius: 8px;
      padding: 12px 16px;
      color: #e0e0e0;
      font-size: 12px;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      min-width: 280px;
    }
    #export-panel.hidden { display: none; }
    .export-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .export-title { font-weight: 600; font-size: 13px; }
    .export-close {
      background: transparent;
      border: none;
      color: #666;
      font-size: 16px;
      cursor: pointer;
      padding: 0;
    }
    .export-close:hover { color: #fff; }
    .export-columns {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 12px;
      margin-bottom: 12px;
      padding: 8px;
      background: #1a1a1a;
      border-radius: 4px;
      max-width: 400px;
    }
    .export-columns label {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      font-size: 11px;
    }
    .export-columns input[type="checkbox"] { cursor: pointer; }
    .export-actions {
      display: flex;
      gap: 8px;
    }
    .export-btn {
      background: #4a9eff;
      border: none;
      color: #fff;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }
    .export-btn:hover { background: #3a8eef; }
    .export-btn.secondary {
      background: #333;
      border: 1px solid #555;
    }
    .export-btn.secondary:hover { background: #444; }
    /* ── Filter Sidebar (Embedding Atlas-style) ── */
    .fs-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .fs-title { font-weight: 600; font-size: 13px; color: #e0e0e0; }
    #fs-count { flex: 1; text-align: right; font-size: 11px; color: #888; }
    #fs-clear-all {
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #888;
      font-size: 10px;
      cursor: pointer;
    }
    #fs-clear-all:hover { background: rgba(255,255,255,0.08); color: #aaa; }
    #fs-clear-all.hidden { display: none; }
    #fs-close {
      width: 24px; height: 24px;
      border: none; background: transparent;
      color: #666; font-size: 14px; cursor: pointer;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
    }
    #fs-close:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .fs-section { border-bottom: 1px solid rgba(255,255,255,0.04); }
    .fs-section-head {
      padding: 10px 16px;
      font-size: 11px; font-weight: 600; color: #aaa;
      cursor: pointer;
      display: flex; align-items: center; justify-content: space-between;
      user-select: none;
    }
    .fs-section-head:hover { background: rgba(255,255,255,0.02); }
    .fs-chevron { font-size: 8px; color: #666; transition: transform 0.2s; }
    .fs-section.collapsed .fs-section-body { display: none; }
    .fs-section.collapsed .fs-chevron { transform: rotate(-90deg); }
    .fs-section-body { padding: 0 16px 12px; }
    /* Categorical bars */
    .fs-bar-row {
      display: flex; align-items: center; gap: 8px;
      padding: 3px 0; cursor: pointer; font-size: 11px; border-radius: 3px;
    }
    .fs-bar-row:hover { background: rgba(255,255,255,0.03); }
    .fs-bar-row.deselected { opacity: 0.3; }
    .fs-bar-label {
      width: 100px; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; color: #ccc; flex-shrink: 0;
    }
    .fs-bar-track {
      flex: 1; height: 14px;
      background: rgba(255,255,255,0.04); border-radius: 2px;
      position: relative; overflow: hidden;
    }
    .fs-bar-total {
      position: absolute; top: 0; left: 0; height: 100%;
      background: rgba(255,255,255,0.08); border-radius: 2px;
    }
    .fs-bar-selected {
      position: absolute; top: 0; left: 0; height: 100%;
      background: #4a9eff; border-radius: 2px; transition: width 0.15s;
    }
    .fs-bar-count {
      font-size: 10px; color: #666;
      min-width: 70px; text-align: right; white-space: nowrap;
    }
    .fs-show-more {
      font-size: 10px; color: #4a9eff; cursor: pointer;
      padding: 4px 0; user-select: none;
    }
    .fs-show-more:hover { text-decoration: underline; }
    /* Histogram */
    .fs-histogram {
      position: relative; height: 80px;
      display: flex; align-items: flex-end; gap: 1px; margin-bottom: 4px;
    }
    .fs-hist-bar {
      flex: 1; background: rgba(255,255,255,0.12);
      border-radius: 1px 1px 0 0; min-width: 2px; transition: background 0.1s;
    }
    .fs-hist-bar.in-brush { background: #4a9eff; }
    .fs-hist-brush {
      position: absolute; top: 0; height: 100%;
      background: rgba(74, 158, 255, 0.15);
      border-left: 2px solid rgba(74, 158, 255, 0.5);
      border-right: 2px solid rgba(74, 158, 255, 0.5);
      pointer-events: none; display: none;
    }
    .fs-hist-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      cursor: crosshair;
    }
    .fs-hist-axis {
      display: flex; justify-content: space-between;
      font-size: 9px; color: #666; padding: 0 2px;
    }
    .fs-hist-range {
      text-align: center; font-size: 10px; color: #8ac4ff;
      margin-top: 2px; min-height: 14px;
    }
    /* Card links section */
    .card-links {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #333;
    }
    .card-link {
      display: inline-block;
      background: #4a9eff;
      color: #fff;
      text-decoration: none;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 500;
    }
    .card-link:hover { background: #3a8eef; }
    .card-subtitle {
      font-style: italic;
      color: #9ca3af;
      font-size: 11px;
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    /* ── Toolbar ── */
    #toolbar {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      background: rgba(14, 14, 18, 0.82);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 14px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.45);
      z-index: 200;
      user-select: none;
    }
    .tb-group { display: flex; align-items: center; gap: 6px; padding: 0 8px; }
    #tb-count { font-size: 13px; color: #999; white-space: nowrap; }
    .tb-sep { width: 1px; height: 28px; background: rgba(255,255,255,0.08); margin: 0 4px; }
    .tb-icon {
      width: 40px; height: 36px;
      border: none; background: transparent; border-radius: 8px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: #999; transition: background 0.12s, color 0.12s; padding: 0;
    }
    .tb-icon:hover { background: rgba(255,255,255,0.06); color: #e0e0e0; }
    .tb-icon.active { background: rgba(74,158,255,0.15); color: #4a9eff; }
    .tb-icon.on { color: #4a9eff; }
    .tb-icon svg { width: 20px; height: 20px; }
    #tb-clear {
      width: 24px; height: 24px; border: none; background: transparent;
      border-radius: 4px; cursor: pointer; color: #666; font-size: 16px;
      display: none; align-items: center; justify-content: center; padding: 0;
    }
    #tb-clear:hover { color: #fff; }
    #tb-clear.visible { display: flex; }

    /* ── Side Panels ── */
    .side-panel {
      position: fixed; top: 0; right: 0;
      width: 320px; height: 100vh;
      background: rgba(14, 14, 18, 0.82);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-left: 1px solid rgba(255,255,255,0.06);
      box-shadow: -10px 0 32px rgba(0,0,0,0.45);
      z-index: 150;
      overflow-y: auto; overflow-x: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
      transform: translateX(100%);
      transition: transform 0.25s cubic-bezier(.4,0,.2,1);
      display: flex; flex-direction: column;
    }
    .side-panel::-webkit-scrollbar { width: 4px; }
    .side-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    .side-panel.open { transform: translateX(0); }
    .panel-head {
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .panel-title { font-weight: 600; font-size: 13px; color: #e0e0e0; }
    .panel-close {
      width: 24px; height: 24px; border: none; background: transparent;
      color: #666; font-size: 14px; cursor: pointer; border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
    }
    .panel-close:hover { color: #fff; background: rgba(255,255,255,0.08); }
    .panel-body { padding: 12px 16px; flex: 1; }
    .panel-body label { font-size: 11px; color: #999; display: block; margin-bottom: 4px; }
    .panel-body select, .panel-body input[type="text"] {
      width: 100%; padding: 6px 8px; border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04); color: #e0e0e0;
      font-size: 12px; box-sizing: border-box;
    }
    /* Color panel legend */
    .panel-body select { margin-bottom: 12px; }
    .panel-body .search-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
    .panel-body .search-btn {
      background: #4a9eff; border: none; color: #fff;
      padding: 6px 12px; border-radius: 6px; cursor: pointer;
      font-size: 12px; white-space: nowrap;
    }
    .panel-body .search-btn:hover { opacity: 0.9; }
    .panel-body .search-btn.clear {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1); color: #888;
    }
    .panel-body .partial-match {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; cursor: pointer; color: #888;
    }
    #panel-explore .panel-body {
      padding: 0;
      overflow-y: auto;
    }
    .explore-section {
      padding: 12px 16px;
    }
    .explore-section + .explore-section {
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .explore-section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: #9ca3af;
      margin-bottom: 6px;
    }
    #panel-explore #fs-sections {
      padding-bottom: 6px;
    }
    #panel-explore .fs-header {
      padding: 0 0 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 6px;
    }

    /* ── Light theme ── */
    [data-theme="light"] { background: #f5f5f7 !important; color: #1d1d1f; }
    [data-theme="light"] #toolbar {
      background: rgba(245, 245, 248, 0.88);
      border-color: rgba(0,0,0,0.08);
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    }
    [data-theme="light"] #toolbar .tb-icon { color: #6e6e73; }
    [data-theme="light"] #toolbar .tb-icon:hover { background: rgba(0,0,0,0.05); color: #1d1d1f; }
    [data-theme="light"] #toolbar .tb-icon.active { background: rgba(0,122,255,0.1); color: #007aff; }

      border-top: 1px solid rgba(255,255,255,0.04);

      font-size: 10px;
      color: #aaa;
      min-width: 20px;
      text-align: right;

// Decode gzip-compressed binary data using fflate
function decodeGzipBuffer(buffer, dtype) {
  const bytes = new Uint8Array(buffer);
  const decompressed = fflate.gunzipSync(bytes);
  // fflate may return a view with non-zero byteOffset; copy to aligned buffer
  const aligned = decompressed.slice().buffer;
  switch (dtype) {
    case 'uint16': return new Uint16Array(aligned);
    case 'uint32': return new Uint32Array(aligned);
    case 'float32': return new Float32Array(aligned);
    case 'int32': return new Int32Array(aligned);
    default: throw new Error('Unknown dtype: ' + dtype);
  }
}

// Decode gzip-compressed JSON string data
function decodeGzipBufferString(buffer) {
  const bytes = new Uint8Array(buffer);
  const decompressed = fflate.gunzipSync(bytes);
  const text = new TextDecoder().decode(decompressed);
  return JSON.parse(text);
}

function dequantizeCoords(quantized, bits = 16) {
  const n = quantized.length / 2;
  const maxVal = bits === 16 ? 65535 : 4294967295;
  const scale = 2.0 / maxVal;
  const x = new Float32Array(n);
  const y = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    x[i] = quantized[i * 2] * scale - 1.0;
    y[i] = quantized[i * 2 + 1] * scale - 1.0;
  }
  return { x, y };
}

// Decode a column from binary data (buffer)
function decodeColumnBuffer(name, buffer) {
  const meta = columnMeta[name];
  if (!meta) return null;
  if (meta.dtype === 'string') {
    const values = decodeGzipBufferString(buffer);
    columns[name] = { values, dtype: 'string', role: meta.role, colormap: meta.colormap };
  } else if (meta.dictionary) {
    const decoded = decodeGzipBuffer(buffer, meta.dtype);
    columns[name] = {
      values: Array.from(decoded).map(i => meta.dictionary[i]),
      dtype: 'categorical', role: meta.role, colormap: meta.colormap,
    };
  } else {
    const decoded = decodeGzipBuffer(buffer, meta.dtype);
    columns[name] = {
      values: decoded,
      dtype: meta.dtype === 'float32' ? 'continuous' : meta.dtype,
      role: meta.role, colormap: meta.colormap,
    };
  }
  return columns[name];
}

// Fetch/decode a column by name
async function fetchColumn(name) {
  if (columns[name]) return columns[name];
  const meta = columnMeta[name];
  if (!meta) return null;

  const fileKey = meta.file || name;
  const resp = await fetch('./col_' + encodeURIComponent(fileKey) + '.bin');
  if (!resp.ok) return null;
  const buffer = await resp.arrayBuffer();
  return decodeColumnBuffer(name, buffer);
}

function createLinearScale(initialDomain, initialRange) {
  let d0 = initialDomain[0], d1 = initialDomain[1];
  let r0 = initialRange[0], r1 = initialRange[1];
  const scale = (value) => {
    const denom = d1 - d0;
    if (denom === 0) return r0;
    return r0 + ((value - d0) / denom) * (r1 - r0);
  };
  scale.domain = (nd) => { if (nd === undefined) return [d0,d1]; d0=nd[0]; d1=nd[1]; return scale; };
  scale.range = (nr) => { if (nr === undefined) return [r0,r1]; r0=nr[0]; r1=nr[1]; return scale; };
  return scale;
}

const edgeXScale = createLinearScale([-1, 1], [0, canvas.clientWidth || window.innerWidth]);
const edgeYScale = createLinearScale([-1, 1], [canvas.clientHeight || window.innerHeight, 0]);

const fallbackPointColor = metadata.pointColor || '#4a9eff';

// === WebGL Edge Rendering ===
// Edges rendered via regl on a separate WebGL canvas (GPU-accelerated).
// For N > 1M, edges default to OFF and load lazily on first toggle.
let edgeNeedsRedraw = false;
let edgesVisible = hasEdges && N <= 1_000_000;
let edgesLoaded = false;
let edgeRegl = null;
let drawEdgesCmd = null;
let edgeCanvas = null;

function parseEdgeColor(str) {
  const m = str.match(/rgba?\\(\\s*([\\d.]+)\\s*,\\s*([\\d.]+)\\s*,\\s*([\\d.]+)\\s*(?:,\\s*([\\d.]+))?\\s*\\)/);
  if (m) return [+m[1]/255, +m[2]/255, +m[3]/255, m[4] !== undefined ? +m[4] : 1];
  return [0, 0, 0, 0.5];
}
const edgeColor = parseEdgeColor(edgeStrokeStyle);

function resizeEdgeCanvas() {
  if (!edgeCanvas) return;
  const dpr = window.devicePixelRatio || 1;
  edgeCanvas.width = window.innerWidth * dpr;
  edgeCanvas.height = window.innerHeight * dpr;
  if (edgeRegl) edgeRegl.poll();
  edgeNeedsRedraw = true;
}

async function loadEdges() {
  if (edgesLoaded || !hasEdges) return;

  const buf = await fetch('./edges.bin').then(r => r.arrayBuffer());
  const raw = decodeGzipBuffer(buf, 'uint32');
  const eS = raw.subarray(0, nEdges);
  const eT = raw.subarray(nEdges, 2 * nEdges);

  // Interleaved position buffer from point coordinates
  const positions = new Float32Array(n * 2);
  for (let i = 0; i < n; i++) {
    positions[i * 2] = x[i];
    positions[i * 2 + 1] = y[i];
  }

  // Element index buffer: pairs of vertex indices per edge
  const elements = new Uint32Array(nEdges * 2);
  for (let i = 0; i < nEdges; i++) {
    elements[i * 2] = eS[i];
    elements[i * 2 + 1] = eT[i];
  }

  edgeRegl = createREGL({
    canvas: edgeCanvas,
    extensions: ['OES_element_index_uint'],
    attributes: { alpha: true, premultipliedAlpha: false, antialias: true },
  });

  const vertSrc = 'precision highp float; attribute vec2 position; uniform vec2 u_scale; uniform vec2 u_offset; void main() { gl_Position = vec4(position * u_scale + u_offset, 0.0, 1.0); }';
  const fragSrc = 'precision mediump float; uniform vec4 u_color; void main() { gl_FragColor = u_color; }';

  drawEdgesCmd = edgeRegl({
    vert: vertSrc,
    frag: fragSrc,
    attributes: {
      position: { buffer: edgeRegl.buffer(positions), size: 2 },
    },
    elements: edgeRegl.elements({ data: elements, primitive: 'lines', type: 'uint32' }),
    uniforms: {
      u_scale: edgeRegl.prop('scale'),
      u_offset: edgeRegl.prop('offset'),
      u_color: edgeRegl.prop('color'),
    },
    blend: {
      enable: true,
      func: { srcRGB: 'src alpha', srcAlpha: 1, dstRGB: 'one minus src alpha', dstAlpha: 1 },
    },
    depth: { enable: false },
  });

  edgesLoaded = true;
  edgeNeedsRedraw = true;
}

function renderEdges() {
  if (!edgesLoaded || !edgesVisible || !edgeRegl) return;
  edgeRegl.poll();
  edgeRegl.clear({ color: [0, 0, 0, 0] });

  // Derive data-to-clip-space transform from scatterplot's live scales
  const xd = edgeXScale.domain();
  const yd = edgeYScale.domain();
  const xRange = xd[1] - xd[0] || 1;
  const yRange = yd[1] - yd[0] || 1;

  drawEdgesCmd({
    scale: [2 / xRange, 2 / yRange],
    offset: [-(xd[1] + xd[0]) / xRange, -(yd[1] + yd[0]) / yRange],
    color: edgeColor,
  });
  edgeNeedsRedraw = false;
}

const redrawEdges = renderEdges;

if (hasEdges) {
  scatterplot.subscribe('drawing', (event) => {
    if (!edgesVisible || !edgesLoaded) return;
    if (edgeNeedsRedraw || (event && event.isViewChanged)) renderEdges();
  });

  window.addEventListener('resize', () => {
    resizeEdgeCanvas();
    renderEdges();
  });

  async function toggleEdges() {
    edgesVisible = !edgesVisible;
    if (tbEdges) tbEdges.classList.toggle('on', edgesVisible);
    if (edgesVisible && !edgesLoaded) {
      try { await loadEdges(); } catch (err) {
        console.error('Failed to load edges:', err);
        edgesVisible = false;
        if (tbEdges) tbEdges.classList.remove('on');
        return;

    }
    if (edgesVisible) { edgeNeedsRedraw = true; renderEdges(); }
    else if (edgeRegl) { edgeRegl.poll(); edgeRegl.clear({ color: [0, 0, 0, 0] }); }
  }
  if (tbEdges) tbEdges.addEventListener('click', toggleEdges);

  // For small datasets (<=1M), load edges eagerly during startup
  if (edgesVisible) await loadEdges();

// Color mapping
function buildContinuousMapping(rawValues, baseCmap) {
  const nums = new Float64Array(rawValues.length);
  const missing = new Array(rawValues.length);
  let min = Infinity, max = -Infinity, hasNaN = false;

  for (let i = 0; i < rawValues.length; i++) {
    const raw = rawValues[i];
    const v = Number(raw);
    nums[i] = v;
    const isMissing = raw === null || raw === undefined || !Number.isFinite(v);
    missing[i] = isMissing;
    if (isMissing) { hasNaN = true; continue; }
    if (v < min) min = v;
    if (v > max) max = v;
  }

  if (min === Infinity) { min = 0; max = 0; }
  const range = max === min ? 1 : max - min;
  const w = new Float32Array(rawValues.length);

  if (!hasNaN) {
    for (let i = 0; i < rawValues.length; i++) w[i] = (nums[i] - min) / range;
    return { cmap: baseCmap, w, min, max, hasNaN: false };
  }

  const baseCount = Math.max(1, baseCmap.length);
  const offset = 1 / baseCount;
  const scale = baseCount > 1 ? (baseCount - 1) / baseCount : 0;
  for (let i = 0; i < rawValues.length; i++) {
    w[i] = missing[i] ? 0 : ((nums[i] - min) / range) * scale + offset;
  }
  return { cmap: [NAN_FALLBACK_COLOR, ...baseCmap], w, min, max, hasNaN: true };
}

async function applyColor(columnName) {
  const col = await fetchColumn(columnName);
  if (!col) {
    scatterplot.set({ colorBy: null, pointColor: fallbackPointColor });
    edgeNeedsRedraw = true;
    scatterplot.draw({ x, y }).then(() => { redrawEdges(); });
    updateLegend('', null);
    return;
  }

  const cmap = (col.colormap && colormaps[col.colormap]) || [fallbackPointColor];

  if (col.dtype === 'categorical') {
    const mapping = new Map();
    const z = new Float32Array(n);
    const values = col.values;
    for (let i = 0; i < n; i++) {
      const v = values[i];
      if (!mapping.has(v)) mapping.set(v, mapping.size);
      z[i] = mapping.get(v);
    }
    edgeNeedsRedraw = true;
    scatterplot.set({ colorBy: 'valueA', pointColor: cmap });
    scatterplot.draw({ x, y, z, w: zeroArray }).then(() => { redrawEdges(); });
  } else {
    const mapping = buildContinuousMapping(col.values, cmap);
    edgeNeedsRedraw = true;
    scatterplot.set({ colorBy: 'valueB', pointColor: mapping.cmap });
    scatterplot.draw({ x, y, z: zeroArray, w: mapping.w }).then(() => { redrawEdges(); });
  }
  updateLegend(columnName, col);
}

function formatValue(val) {
  if (typeof val === 'number') {
    const abs = Math.abs(val);
    if (abs >= 1000 || (abs > 0 && abs < 0.01)) return val.toExponential(2);
    return val.toFixed(3);
  }
  return String(val);
}

function buildGradient(colors) {
  if (!colors || colors.length === 0) return '#000000';
  const steps = Math.min(12, colors.length);
  if (steps === 1) return colors[0];
  const stops = [];
  for (let i = 0; i < steps; i++) {
    const t = i / (steps - 1);
    const idx = Math.round((colors.length - 1) * t);
    stops.push(colors[idx] + ' ' + Math.round(t * 100) + '%');
  }
  return 'linear-gradient(90deg, ' + stops.join(', ') + ')';
}

function updateLegend(columnName, col) {
  if (!col || col.role === 'label') {
    legendTitle.textContent = '';
    legendContent.innerHTML = '';
    return;
  }

  const cmap = (col.colormap && colormaps[col.colormap]) || [fallbackPointColor];
  legendTitle.textContent = columnName;

  if (col.dtype === 'categorical') {
    const mapping = new Map();
    const items = [];
    for (let i = 0; i < col.values.length; i++) {
      const v = col.values[i];
      if (!mapping.has(v)) { mapping.set(v, mapping.size); items.push(v); }
    }
    let html = '';
    for (let i = 0; i < items.length; i++) {
      html += '<div class="legend-item"><span class="legend-swatch" style="background:' +
        cmap[i % cmap.length] + '"></span><span>' + items[i] + '</span></div>';
    }
    legendContent.innerHTML = html;
  } else {
    const mapping = buildContinuousMapping(col.values, cmap);
    let legendHtml =
      '<div class="legend-gradient" style="background:' + buildGradient(cmap) + '"></div>' +
      '<div class="legend-range"><span>' + formatValue(mapping.min) + '</span><span>' +
      formatValue(mapping.max) + '</span></div>';
    if (mapping.hasNaN) {
      legendHtml +=
        '<div class="legend-item"><span class="legend-swatch" style="background:' +
        NAN_FALLBACK_COLOR + '"></span><span>NaN</span></div>';
    }
    legendContent.innerHTML = legendHtml;
  }
}

// Tooltip

function showTooltip(idx) {

// ============================================
// Card Stack System (single-click pinned cards)
// ============================================

const cardStack = document.getElementById('card-stack');
const CARD_WIDTH_STORAGE_KEY = 'tmap.card.width';
const CARD_BODY_HEIGHT_STORAGE_KEY = 'tmap.card.bodyMaxHeight';
const CARD_WIDTH_DEFAULT = 320;
const CARD_WIDTH_MIN = 280;
const CARD_WIDTH_MAX = 520;
const CARD_BODY_HEIGHT_DEFAULT = 420;
const CARD_BODY_HEIGHT_MIN = 220;
const pinnedCards = []; // Array of point indices
let currentCardIndex = 0;

const MAX_CARDS = 50;

function clampCardWidth(width) {
  const w = Number(width);
  if (!Number.isFinite(w)) return CARD_WIDTH_DEFAULT;
  return Math.max(CARD_WIDTH_MIN, Math.min(CARD_WIDTH_MAX, Math.round(w)));
}

function cardBodyHeightUpperBound() {
  return Math.max(CARD_BODY_HEIGHT_MIN, window.innerHeight - 120);
}

function clampCardBodyHeight(height) {
  const h = Number(height);
  if (!Number.isFinite(h)) return CARD_BODY_HEIGHT_DEFAULT;
  return Math.max(CARD_BODY_HEIGHT_MIN, Math.min(cardBodyHeightUpperBound(), Math.round(h)));
}

function loadStoredCardDimension(key, clampFn) {
  try {
    const raw = window.localStorage.getItem(key);
    if (raw === null || raw === '') return null;
    return clampFn(raw);
  } catch (e) {
    return null;
  }
}

const storedCardWidth = loadStoredCardDimension(CARD_WIDTH_STORAGE_KEY, clampCardWidth);
const storedCardBodyHeight = loadStoredCardDimension(
  CARD_BODY_HEIGHT_STORAGE_KEY,
  clampCardBodyHeight,
);
let cardWidth = storedCardWidth === null ? CARD_WIDTH_DEFAULT : storedCardWidth;
let cardBodyMaxHeight = (
  storedCardBodyHeight === null ? CARD_BODY_HEIGHT_DEFAULT : storedCardBodyHeight
);
let hasCardSizeOverride = storedCardWidth !== null || storedCardBodyHeight !== null;

function applyCardSize() {
  cardBodyMaxHeight = clampCardBodyHeight(cardBodyMaxHeight);
  cardStack.style.setProperty('--card-width', cardWidth + 'px');
  cardStack.style.setProperty('--card-body-max-height', cardBodyMaxHeight + 'px');
  const card = cardStack.querySelector('.card');
  const cardBody = cardStack.querySelector('.card-body');
  if (!card || !cardBody) return;
  if (hasCardSizeOverride) {
    card.style.setProperty('width', cardWidth + 'px', 'important');
    cardBody.style.setProperty('max-height', cardBodyMaxHeight + 'px', 'important');
  } else {
    card.style.removeProperty('width');
    cardBody.style.removeProperty('max-height');
  }
}

function setCardSize(width, bodyHeight, persist = true) {
  cardWidth = clampCardWidth(width);
  cardBodyMaxHeight = clampCardBodyHeight(bodyHeight);
  hasCardSizeOverride = true;
  applyCardSize();
  if (!persist) return;
  try {
    window.localStorage.setItem(CARD_WIDTH_STORAGE_KEY, String(cardWidth));
    window.localStorage.setItem(CARD_BODY_HEIGHT_STORAGE_KEY, String(cardBodyMaxHeight));
  } catch (e) {
    // no-op: storage may be unavailable
  }
}

applyCardSize();

function startCardResize(e) {
  if (e.pointerType === 'mouse' && e.button !== 0) return;
  e.preventDefault();
  e.stopPropagation();
  const handle = e.currentTarget;
  const pointerId = e.pointerId;
  const startX = e.clientX;
  const startY = e.clientY;
  const startWidth = cardWidth;
  const startBodyHeight = cardBodyMaxHeight;
  document.body.classList.add('card-resizing');

  if (handle && handle.setPointerCapture) {
    try { handle.setPointerCapture(pointerId); } catch (err) {}
  }

  function onMove(ev) {
    if (pointerId !== undefined && ev.pointerId !== pointerId) return;
    const deltaX = ev.clientX - startX;
    const deltaY = ev.clientY - startY;
    setCardSize(startWidth + deltaX, startBodyHeight + deltaY, false);
  }

  function onUp(ev) {
    if (pointerId !== undefined && ev.pointerId !== pointerId) return;
    handle?.removeEventListener('pointermove', onMove);
    handle?.removeEventListener('pointerup', onUp);
    handle?.removeEventListener('pointercancel', onUp);
    if (handle && handle.releasePointerCapture) {
      try { handle.releasePointerCapture(pointerId); } catch (err) {}
    }
    document.body.classList.remove('card-resizing');
    setCardSize(cardWidth, cardBodyMaxHeight, true);
  }

  handle?.addEventListener('pointermove', onMove);
  handle?.addEventListener('pointerup', onUp);
  handle?.addEventListener('pointercancel', onUp);
}

function getLabel(idx) {
  for (const name of labelOptions) {
    const col = columns[name];
    if (col && col.values[idx] !== undefined) {
      return col.values[idx];
    }
  }
  return 'Point ' + idx;
}

let hoveredPointIndex = -1;
let cardMinimized = false;
scatterplot.subscribe('pointover', (idx) => { hoveredPointIndex = idx; });
scatterplot.subscribe('pointout', () => { hoveredPointIndex = -1; });

// Drag detection - only select on click, not drag
let mouseDownPos = null;
const DRAG_THRESHOLD = 5;

canvas.addEventListener('mousedown', (e) => {
  mouseDownPos = { x: e.clientX, y: e.clientY };
});

canvas.addEventListener('mouseup', (e) => {
  if (!mouseDownPos) return;

  const dx = e.clientX - mouseDownPos.x;
  const dy = e.clientY - mouseDownPos.y;
  const distance = Math.sqrt(dx * dx + dy * dy);
  mouseDownPos = null;

  if (distance > DRAG_THRESHOLD) return;
  if (e.shiftKey || e.ctrlKey || e.metaKey) return;
  if (hoveredPointIndex < 0) return;

  const idx = hoveredPointIndex;
  const existingIndex = pinnedCards.indexOf(idx);

  if (existingIndex >= 0) {
    currentCardIndex = existingIndex;
  } else {
    if (pinnedCards.length >= MAX_CARDS) {
      pinnedCards.shift();
    }
    pinnedCards.push(idx);
    currentCardIndex = pinnedCards.length - 1;
  }
  renderCardStack();
});

function truncateString(str, maxLen) {
  if (!str || str.length <= maxLen) return str;
  return str.substring(0, maxLen - 3) + '...';
}

function renderCardStack() {
  if (pinnedCards.length === 0) {
    cardStack.classList.add('hidden');
    cardStack.innerHTML = '';
    return;
  }

  cardStack.classList.remove('hidden');
  const idx = pinnedCards[currentCardIndex];
  const cardConfig = metadata.card || null;

  // Determine card title
  let cardTitle;
  if (cardConfig && cardConfig.titleColumn) {
    const titleCol = columns[cardConfig.titleColumn];
    cardTitle = titleCol ? String(titleCol.values[idx]) : getLabel(idx);
  } else {
    cardTitle = getLabel(idx);
  }

  // Find SMILES column (if any)
  const smilesColName = metadata.smilesColumn;
  const smilesCol = smilesColName ? columns[smilesColName] : null;
  const smilesValue = smilesCol ? smilesCol.values[idx] : null;

  let html = '<div class="card' + (cardMinimized ? ' minimized' : '') + '">';

  // Header with navigation
  html += '<div class="card-header">';
  html += '<div class="card-nav">';
  html += '<button id="card-prev" ' + (currentCardIndex <= 0 ? 'disabled' : '') + '>&larr;</button>';
  html += '<span>' + (currentCardIndex + 1) + ' of ' + pinnedCards.length + '</span>';
  html += '<button id="card-next" ' + (currentCardIndex >= pinnedCards.length - 1 ? 'disabled' : '') + '>&rarr;</button>';
  html += '</div>';
  html += '<div>';
  html += '<button class="card-minimize" id="card-minimize" title="' + (cardMinimized ? 'Expand' : 'Minimize') + '">' + (cardMinimized ? '&#9650;' : '&#9660;') + '</button>';
  html += '<button class="card-close" id="card-close" title="Close">&times;</button>';
  html += '</div>';
  html += '</div>';

  // Card body
  html += '<div class="card-body">';
  html += '<div class="card-label">' + truncateString(cardTitle, 40) + '</div>';

  // Subtitle (from card config)
  if (cardConfig && cardConfig.subtitleColumn) {
    const subCol = columns[cardConfig.subtitleColumn];
    if (subCol) {
      html += '<div class="card-subtitle">' + truncateString(String(subCol.values[idx]), 50) + '</div>';
    }
  }

  // Structure container placeholder (only if SMILES or protein data exists)
  if (metadata.smilesColumn || metadata.proteinColumn || metadata.structuresColumn) {
    html += '<div class="card-structure-container hidden" id="card-structure"></div>';
  }
  // Image container placeholder (only if images data exists)
  if (metadata.imagesColumn) {
    html += '<div class="card-image-container hidden" id="card-image"></div>';
  }

  // SMILES row with copy button
  if (smilesValue && typeof smilesValue === 'string') {
    html += '<div class="card-copy-row">';
    html += '<span class="key">SMILES</span>';
    html += '<span class="value">' + truncateString(smilesValue, 25) + '</span>';
    html += '<button class="card-copy-btn" id="copy-smiles" data-value="' + smilesValue.replace(/"/g, '&quot;') + '">Copy</button>';
    html += '</div>';
  }

  // Determine which fields to show
  const fieldList = (cardConfig && cardConfig.fields) ? cardConfig.fields : labelOptions;
  const skipColumns = new Set();
  if (smilesColName) skipColumns.add(smilesColName);
  if (cardConfig && cardConfig.titleColumn) skipColumns.add(cardConfig.titleColumn);
  if (cardConfig && cardConfig.subtitleColumn) skipColumns.add(cardConfig.subtitleColumn);

  for (const name of fieldList) {
    if (skipColumns.has(name)) continue;
    const col = columns[name];
    if (!col) continue;
    const val = col.values[idx];
    const colUi = (columnMeta[name] && columnMeta[name].ui) || {};
    const displayName = colUi.displayName || name;
    const displayVal = truncateString(formatValue(val), 30);
    const isCopyable = colUi.copyable === true || (typeof val === 'string' && val.length > 0 && colUi.copyable !== false);

    if (isCopyable && typeof val === 'string' && val.length > 0) {
      html += '<div class="card-copy-row">';
      html += '<span class="key">' + displayName + '</span>';
      html += '<span class="value">' + displayVal + '</span>';
      html += '<button class="card-copy-btn" data-value="' + String(val).replace(/"/g, '&quot;') + '">Copy</button>';
      html += '</div>';
    } else {
      html += '<div class="card-row">';
      html += '<span class="key">' + displayName + '</span>';
      html += '<span class="value">' + displayVal + '</span>';
      html += '</div>';
    }
  }

  // Links (from card config)
  if (cardConfig && cardConfig.links && cardConfig.links.length > 0) {
    html += '<div class="card-links">';
    for (const link of cardConfig.links) {
      let url = link.url;
      // Replace {column_name} placeholders with values from this point
      url = url.replace(/\{([^}]+)\}/g, (match, colName) => {
        const c = columns[colName];
        return c ? encodeURIComponent(String(c.values[idx])) : match;
      });
      html += '<a class="card-link" href="' + url + '" target="_blank" rel="noopener">' + link.label + '</a>';
    }
    html += '</div>';
  }

  html += '</div>'; // close card-body
  html += '</div>'; // close card
  html += '<div class="card-resize-handle" id="card-resize-handle" title="Resize panel"></div>';
  cardStack.innerHTML = html;
  applyCardSize();

  // Attach event listeners
  document.getElementById('card-prev')?.addEventListener('click', () => {
    if (currentCardIndex > 0) { currentCardIndex--; renderCardStack(); }
  });
  document.getElementById('card-next')?.addEventListener('click', () => {
    if (currentCardIndex < pinnedCards.length - 1) { currentCardIndex++; renderCardStack(); }
  });
  document.getElementById('card-minimize')?.addEventListener('click', () => {
    cardMinimized = !cardMinimized;
    renderCardStack();
  });
  document.getElementById('card-close')?.addEventListener('click', () => {
    pinnedCards.splice(currentCardIndex, 1);
    if (currentCardIndex >= pinnedCards.length) currentCardIndex = Math.max(0, pinnedCards.length - 1);
    renderCardStack();
  });
  document.getElementById('card-resize-handle')?.addEventListener('pointerdown', startCardResize);

  // Copy buttons
  cardStack.querySelectorAll('.card-copy-btn').forEach((btn) => {
    btn.addEventListener('click', async (e) => {
      const value = btn.dataset.value;
      try {
        await navigator.clipboard.writeText(value);
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
      } catch (err) {
        console.error('Copy failed:', err);
        btn.textContent = 'Failed';
        setTimeout(() => { btn.textContent = 'Copy'; }, 1500);
      }
    });
  });

  // Trigger custom event for SMILES template extension
  cardStack.dispatchEvent(new CustomEvent('cardrendered', { detail: { idx, smilesValue } }));
}

// Export Panel System (multi-select)

const exportPanel = document.getElementById('export-panel');
const exportTitle = document.getElementById('export-title');
const exportColumns = document.getElementById('export-columns');
const exportCsvBtn = document.getElementById('export-csv');
const exportTsvBtn = document.getElementById('export-tsv');
const exportClearBtn = document.getElementById('export-clear');
const exportCloseBtn = document.getElementById('export-close');

let selectedIndices = [];

// Build column checkboxes (fetch all label columns first)
async function buildExportColumns() {
  let html = '';
  for (const name of labelOptions) {
    const col = await fetchColumn(name);
    if (!col) continue;
    html += '<label><input type="checkbox" value="' + name + '" checked> ' + name + '</label>';
  }
  exportColumns.innerHTML = html;
}
buildExportColumns();

function showExportPanel(indices) {
  selectedIndices = indices;
  exportTitle.textContent = indices.length.toLocaleString() + ' points selected';
  exportPanel.classList.remove('hidden');
}

function hideExportPanel() {
  selectedIndices = [];
  exportPanel.classList.add('hidden');
}

scatterplot.subscribe('select', (selection) => {
  const indices = selection.points || selection;
  if (Array.isArray(indices) && indices.length > 1) {
    showExportPanel(indices);
  } else {
    hideExportPanel();
  }
});

function getSelectedColumns() {
  const checked = [];
  exportColumns.querySelectorAll('input[type="checkbox"]:checked').forEach((cb) => {
    checked.push(cb.value);
  });
  return checked;
}

async function exportData(separator, extension) {
  const colNames = getSelectedColumns();
  if (colNames.length === 0 || selectedIndices.length === 0) return;

  // Ensure all selected columns are fetched
  for (const name of colNames) {
    await fetchColumn(name);
  }

  const rows = [colNames.join(separator)];

  for (const idx of selectedIndices) {
    const rowValues = colNames.map((name) => {
      const col = columns[name];
      if (!col) return '';
      const val = col.values[idx];
      let strVal = typeof val === 'number' ? formatValue(val) : String(val ?? '');
      if (strVal.includes(separator) || strVal.includes('"') || strVal.includes('\\n')) {
        strVal = '"' + strVal.replace(/"/g, '""') + '"';
      }
      return strVal;
    });
    rows.push(rowValues.join(separator));
  }

  const content = rows.join('\\n');
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);

  const a = document.createElement('a');
  a.href = url;
  a.download = 'tmap_export_' + selectedIndices.length + '_points.' + extension;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

exportCsvBtn.addEventListener('click', () => exportData(',', 'csv'));
exportTsvBtn.addEventListener('click', () => exportData('\\t', 'tsv'));
exportClearBtn.addEventListener('click', () => {
  scatterplot.select([]);
  hideExportPanel();
});
exportCloseBtn.addEventListener('click', () => {
  hideExportPanel();
});

// Keyboard shortcut: Escape closes card stack and search
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (pinnedCards.length > 0) {
      pinnedCards.length = 0;
      currentCardIndex = 0;
      renderCardStack();
    }
    if (searchMatches.length > 0) {
      clearSearch();
    }
  }
});

// ============================================
// Search System
// ============================================

const searchColumn = document.getElementById('search-column');
const searchInput = document.getElementById('search-input');
const searchBtn = document.getElementById('search-btn');
const clearSearchBtn = document.getElementById('clear-search');
const partialMatchCheckbox = document.getElementById('partial-match');
const searchResults = document.getElementById('search-results');

let searchMatches = [];

// Populate search column dropdown with string columns
async function buildSearchColumnOptions() {
  searchColumn.innerHTML = '';
  const searchList = metadata.search || null;

  if (searchList && searchList.length > 0) {
    // Use explicit search column list from Python
    for (const name of searchList) {
      const col = await fetchColumn(name);
      if (!col) continue;
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      searchColumn.appendChild(opt);
    }
  } else {
    // Fall back to all string label columns
    for (const name of labelOptions) {
      const col = await fetchColumn(name);
      if (!col) continue;
      const firstVal = col.values[0];
      if (typeof firstVal !== 'string') continue;

      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      searchColumn.appendChild(opt);
    }
    // Add SMILES column if present and not already in labelOptions
    const smilesCol = metadata.smilesColumn;
    if (smilesCol && !labelOptions.includes(smilesCol)) {
      const col = await fetchColumn(smilesCol);
      if (col && typeof col.values[0] === 'string') {
        const opt = document.createElement('option');
        opt.value = smilesCol;
        opt.textContent = smilesCol + ' (SMILES)';
        searchColumn.appendChild(opt);
      }
    }
  }
}
buildSearchColumnOptions();

async function performSearch() {
  const colName = searchColumn.value;
  const query = searchInput.value.trim();
  const partial = partialMatchCheckbox.checked;

  if (!query || !colName) {
    searchResults.textContent = '';
    scatterplot.select([]);
    return;
  }

  const col = await fetchColumn(colName);
  if (!col) {
    searchResults.textContent = 'Column not found';
    return;
  }

  const matches = [];
  const queryLower = query.toLowerCase();

  for (let i = 0; i < col.values.length; i++) {
    const val = String(col.values[i] ?? '');
    const valLower = val.toLowerCase();

    if (partial) {
      if (valLower.includes(queryLower)) matches.push(i);
    } else {
      if (valLower === queryLower) matches.push(i);
    }
  }

  searchMatches = matches;

  if (matches.length === 0) {
    searchResults.textContent = 'No matches found';
    scatterplot.select([]);
  } else {
    searchResults.textContent = matches.length.toLocaleString() + ' match(es) found';
    scatterplot.select(matches);
  }
}

function clearSearch() {
  searchInput.value = '';
  searchResults.textContent = '';
  searchMatches = [];
  scatterplot.select([]);
}

searchBtn.addEventListener('click', performSearch);

// Filter Sidebar (Embedding Atlas-style)
// ============================================

const fsSections = document.getElementById('fs-sections');
const fsCount = document.getElementById('fs-count');
const fsClearAll = document.getElementById('fs-clear-all');

const filterColumnNames = metadata.filters || [];
const filterState = {};
let filteredIndices = null;

function compactNum(v) {
  if (v >= 1e6) return (v/1e6).toFixed(1).replace(/\\.0$/, '') + 'M';
  if (v >= 1e3) return (v/1e3).toFixed(1).replace(/\\.0$/, '') + 'k';
  return v.toLocaleString();
}

function updateFilterCount() {
  const filtered = filteredIndices ? filteredIndices.length : n;
  if (filteredIndices) {
    fsCount.textContent = compactNum(filtered) + ' / ' + compactNum(n) + ' points';
    fsClearAll.classList.remove('hidden');
  } else {
    fsCount.textContent = compactNum(n) + ' points';
    fsClearAll.classList.add('hidden');
  }
}

async function buildFilterSidebar() {
  if (!filterColumnNames.length) return;

  for (const name of filterColumnNames) {
    const col = await fetchColumn(name);
    if (!col) continue;
    const colUi = (columnMeta[name] && columnMeta[name].ui) || {};
    const displayName = colUi.displayName || name;

    const section = document.createElement('div');
    section.className = 'fs-section';

    const head = document.createElement('div');
    head.className = 'fs-section-head';
    head.innerHTML = '<span>' + displayName + '</span><span class="fs-chevron">&#9660;</span>';
    head.addEventListener('click', () => section.classList.toggle('collapsed'));
    section.appendChild(head);

    const body = document.createElement('div');
    body.className = 'fs-section-body';

    if (col.dtype === 'categorical' || typeof col.values[0] === 'string') {
      buildCatSection(name, col, body);
    } else {
      buildNumSection(name, col, body);
    }

    section.appendChild(body);
    fsSections.appendChild(section);
  }

  updateFilterCount();
}

function buildCatSection(colName, col, container) {
  const counts = new Map();
  for (let i = 0; i < col.values.length; i++) {
    const v = String(col.values[i]);
    counts.set(v, (counts.get(v) || 0) + 1);
  }
  const sorted = [...counts.entries()].sort((a, b) => b[1] - a[1]);
  const maxCount = sorted[0][1];
  const showLimit = 15;
  const shown = sorted.slice(0, showLimit);
  const otherEntries = sorted.slice(showLimit);
  const otherCount = otherEntries.reduce((s, [,c]) => s + c, 0);

  function makeRow(value, count, isOther) {
    const row = document.createElement('div');
    row.className = 'fs-bar-row';
    row.dataset.col = colName;
    row.dataset.value = isOther ? '__other__' : value;
    const pct = (count / maxCount * 100).toFixed(1);
    row.innerHTML =
      '<span class="fs-bar-label" title="' + (isOther ? 'other' : String(value).replace(/"/g, '&quot;')) + '">' +
      (isOther ? '<i>(other)</i>' : String(value).replace(/</g, '&lt;')) + '</span>' +
      '<div class="fs-bar-track"><div class="fs-bar-total" style="width:' + pct + '%"></div>' +
      '<div class="fs-bar-selected" style="width:' + pct + '%"></div></div>' +
      '<span class="fs-bar-count">' + compactNum(count) + ' / ' + compactNum(count) + '</span>';
    row.addEventListener('click', () => toggleCatFilter(colName, row.dataset.value));
    return row;
  }

  for (const [value, count] of shown) {
    container.appendChild(makeRow(value, count, false));
  }
  if (otherCount > 0) {
    container.appendChild(makeRow('', otherCount, true));
  }

  filterState[colName] = {
    type: 'cat', selected: null,
    allValues: sorted,
    otherValues: new Set(otherEntries.map(([v]) => v)),
    maxCount,
  };
}

function buildNumSection(colName, col, container) {
  const vals = [];
  for (let i = 0; i < col.values.length; i++) {
    const v = Number(col.values[i]);
    if (Number.isFinite(v)) vals.push(v);
  }
  if (vals.length === 0) return;

  vals.sort((a, b) => a - b);
  const dataMin = vals[0];
  const dataMax = vals[vals.length - 1];
  if (dataMin === dataMax) return;

  const numBins = 40;
  const binWidth = (dataMax - dataMin) / numBins;
  const bins = new Array(numBins).fill(0);
  for (const v of vals) {
    let idx = Math.floor((v - dataMin) / binWidth);
    if (idx >= numBins) idx = numBins - 1;
    bins[idx]++;
  }
  const maxBin = Math.max(...bins);

  const countLabel = document.createElement('div');
  countLabel.style.cssText = 'font-size:9px;color:#555;margin-bottom:2px;';
  countLabel.textContent = '\\u2191 Count';
  container.appendChild(countLabel);

  const hist = document.createElement('div');
  hist.className = 'fs-histogram';
  hist.dataset.col = colName;

  for (let i = 0; i < numBins; i++) {
    const bar = document.createElement('div');
    bar.className = 'fs-hist-bar';
    bar.style.height = (maxBin > 0 ? (bins[i] / maxBin * 100) : 0) + '%';
    bar.dataset.bin = String(i);
    hist.appendChild(bar);
  }

  const brush = document.createElement('div');
  brush.className = 'fs-hist-brush';
  hist.appendChild(brush);

  const overlay = document.createElement('div');
  overlay.className = 'fs-hist-overlay';
  hist.appendChild(overlay);

  container.appendChild(hist);

  const axis = document.createElement('div');
  axis.className = 'fs-hist-axis';
  axis.innerHTML = '<span>' + formatValue(dataMin) + '</span><span>' + formatValue(dataMax) + '</span>';
  container.appendChild(axis);

  const rangeDisplay = document.createElement('div');
  rangeDisplay.className = 'fs-hist-range';
  container.appendChild(rangeDisplay);

  filterState[colName] = { type: 'num', min: null, max: null, dataMin, dataMax, numBins, binWidth };

  // Brush interaction
  let brushing = false, brushStartX = 0;
  overlay.addEventListener('mousedown', (e) => {
    e.preventDefault();
    brushing = true;
    const rect = hist.getBoundingClientRect();
    brushStartX = e.clientX - rect.left;
    brush.style.display = 'block';
    brush.style.left = brushStartX + 'px';
    brush.style.width = '0px';
  });

  document.addEventListener('mousemove', (e) => {
    if (!brushing) return;
    const rect = hist.getBoundingClientRect();
    let currentX = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
    const left = Math.min(brushStartX, currentX);
    const width = Math.abs(currentX - brushStartX);
    brush.style.left = left + 'px';
    brush.style.width = width + 'px';

    const bars = hist.querySelectorAll('.fs-hist-bar');
    const barW = rect.width / numBins;
    bars.forEach((bar, i) => {
      const bl = i * barW, br = bl + barW;
      bar.classList.toggle('in-brush', br >= left && bl <= left + width);
    });

    const dLeft = dataMin + (left / rect.width) * (dataMax - dataMin);
    const dRight = dataMin + ((left + width) / rect.width) * (dataMax - dataMin);
    rangeDisplay.textContent = formatValue(dLeft) + ' \\u2013 ' + formatValue(dRight);
  });

  document.addEventListener('mouseup', () => {
    if (!brushing) return;
    brushing = false;
    const bw = parseFloat(brush.style.width);
    if (bw < 3) {
      brush.style.display = 'none';
      filterState[colName].min = null;
      filterState[colName].max = null;
      rangeDisplay.textContent = '';
      hist.querySelectorAll('.fs-hist-bar').forEach(b => b.classList.remove('in-brush'));
    } else {
      const rect = hist.getBoundingClientRect();
      const bl = parseFloat(brush.style.left);
      filterState[colName].min = dataMin + (bl / rect.width) * (dataMax - dataMin);
      filterState[colName].max = dataMin + ((bl + bw) / rect.width) * (dataMax - dataMin);
    }
    applyAllFilters();
  });

  overlay.addEventListener('dblclick', () => {
    brush.style.display = 'none';
    filterState[colName].min = null;
    filterState[colName].max = null;
    rangeDisplay.textContent = '';
    hist.querySelectorAll('.fs-hist-bar').forEach(b => b.classList.remove('in-brush'));
    applyAllFilters();
  });
}

function toggleCatFilter(colName, value) {
  const state = filterState[colName];
  if (!state || state.type !== 'cat') return;

  if (!state.selected) {
    state.selected = new Set([value]);
  } else if (state.selected.has(value)) {
    state.selected.delete(value);
    if (state.selected.size === 0) state.selected = null;
  } else {
    state.selected.add(value);
  }

  fsSections.querySelectorAll('.fs-bar-row[data-col="' + colName + '"]').forEach(row => {
    row.classList.toggle('deselected', !!state.selected && !state.selected.has(row.dataset.value));
  });

  applyAllFilters();
}

async function applyAllFilters() {
  let indices = null;

  for (const [colName, state] of Object.entries(filterState)) {
    if (state.type === 'cat' && state.selected) {
      const col = columns[colName];
      if (!col) continue;
      const matching = new Set();
      for (let i = 0; i < col.values.length; i++) {
        const v = String(col.values[i]);
        if (state.selected.has(v)) { matching.add(i); }
        else if (state.selected.has('__other__') && state.otherValues.has(v)) { matching.add(i); }
      }
      indices = indices ? indices.filter(i => matching.has(i)) : [...matching];
    } else if (state.type === 'num' && (state.min !== null || state.max !== null)) {
      const col = columns[colName];
      if (!col) continue;
      const matching = new Set();
      for (let i = 0; i < col.values.length; i++) {
        const v = Number(col.values[i]);
        if (!Number.isFinite(v)) continue;
        if (state.min !== null && v < state.min) continue;
        if (state.max !== null && v > state.max) continue;
        matching.add(i);
      }
      indices = indices ? indices.filter(i => matching.has(i)) : [...matching];
    }
  }

  filteredIndices = indices;
  if (indices !== null) {
    scatterplot.filter(indices);
  } else {
    scatterplot.unfilter();
  }

  updateFilterCount();
  updateBarCounts();
}

function updateBarCounts() {
  const matchSet = filteredIndices ? new Set(filteredIndices) : null;

  for (const [colName, state] of Object.entries(filterState)) {
    if (state.type !== 'cat') continue;
    const col = columns[colName];
    if (!col) continue;

    const filteredCounts = new Map();
    for (let i = 0; i < col.values.length; i++) {
      if (matchSet && !matchSet.has(i)) continue;
      filteredCounts.set(String(col.values[i]), (filteredCounts.get(String(col.values[i])) || 0) + 1);
    }

    fsSections.querySelectorAll('.fs-bar-row[data-col="' + colName + '"]').forEach(row => {
      const value = row.dataset.value;
      let filteredCount, totalCount;
      if (value === '__other__') {
        totalCount = [...state.otherValues].reduce((s, v) => {
          const e = state.allValues.find(([val]) => val === v);
          return s + (e ? e[1] : 0);
        }, 0);
        filteredCount = [...state.otherValues].reduce((s, v) => s + (filteredCounts.get(v) || 0), 0);
      } else {
        const e = state.allValues.find(([v]) => v === value);
        totalCount = e ? e[1] : 0;
        filteredCount = filteredCounts.get(value) || 0;
      }
      const bar = row.querySelector('.fs-bar-selected');
      const countEl = row.querySelector('.fs-bar-count');
      if (bar) bar.style.width = (state.maxCount > 0 ? (filteredCount / state.maxCount * 100).toFixed(1) : 0) + '%';
      if (countEl) countEl.textContent = compactNum(filteredCount) + ' / ' + compactNum(totalCount);
    });
  }
}

function clearAllFilters() {
  for (const state of Object.values(filterState)) {
    if (state.type === 'cat') state.selected = null;
    else if (state.type === 'num') { state.min = null; state.max = null; }
  }
  fsSections.querySelectorAll('.fs-bar-row').forEach(r => r.classList.remove('deselected'));
  fsSections.querySelectorAll('.fs-hist-brush').forEach(b => { b.style.display = 'none'; });
  fsSections.querySelectorAll('.fs-hist-bar').forEach(b => b.classList.remove('in-brush'));
  fsSections.querySelectorAll('.fs-hist-range').forEach(r => { r.textContent = ''; });
  scatterplot.unfilter();
  filteredIndices = null;
  updateFilterCount();
  updateBarCounts();
}

fsClearAll.addEventListener('click', clearAllFilters);

function setActivePanelButtons(panelName) {
  document.querySelectorAll('.tb-icon[data-panel]').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tb-icon[data-panel="' + panelName + '"]').forEach(b => b.classList.add('active'));

function focusExploreSection(focus) {
  const scrollHost = exploreBody || explorePanel;
  if (!scrollHost) return;
  if (focus === 'filters' && exploreFiltersSection) {
    scrollHost.scrollTo({ top: exploreFiltersSection.offsetTop - 8, behavior: 'smooth' });
  } else if (focus === 'color') {
    scrollHost.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

function togglePanel(name, opts = {}) {
  const panel = panels[name];
  const requestedFocus = opts.focus || '';
  const wasOpen = panel && panel.classList.contains('open');

  if (wasOpen && name === 'explore' && requestedFocus && panel.dataset.focus !== requestedFocus) {
    panel.dataset.focus = requestedFocus;
    setActivePanelButtons(name);
    focusExploreSection(requestedFocus);
    return;
  }

  Object.values(panels).forEach(p => { if (p) p.classList.remove('open'); });
  document.querySelectorAll('.tb-icon[data-panel]').forEach(b => b.classList.remove('active'));
  if (!wasOpen && panel) {
    panel.classList.add('open');
    if (requestedFocus) panel.dataset.focus = requestedFocus;
    setActivePanelButtons(name);
    if (name === 'explore') focusExploreSection(requestedFocus);
  }
}

// ============================================
// SMILES Rendering via SmilesDrawer
// ============================================

const smilesColumn = metadata.smilesColumn;
const tooltipStructure = document.getElementById('tooltip-structure');

if (smilesColumn && columnMeta[smilesColumn]) {
  // Create SVG element inside the tooltip structure container
  const structureSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  structureSvg.id = 'structure-svg';
  tooltipStructure.appendChild(structureSvg);

  const g = typeof window !== 'undefined' ? window : globalThis;
  const SmiDrawerCtor = g.SmiDrawer;
  const SmilesDrawerLib = g.SmilesDrawer;

  const drawerOptions = { width: 240, height: 200, bondThickness: 1.0, compactDrawing: false };

  let drawer = null;
  let drawSmiles = null;

  if (SmiDrawerCtor) {
    drawer = new SmiDrawerCtor(drawerOptions);
    drawSmiles = (smiles) => drawer.draw(smiles, '#structure-svg', 'light');
  } else if (SmilesDrawerLib && SmilesDrawerLib.Drawer && SmilesDrawerLib.parse) {
    drawer = new SmilesDrawerLib.Drawer(drawerOptions);
    drawSmiles = (smiles) =>
      SmilesDrawerLib.parse(
        smiles,
        (tree) => drawer.draw(tree, 'structure-svg', 'light', false),
        (err) => {
          console.warn('Failed to parse SMILES:', smiles, err);
          tooltipStructure.classList.add('hidden');
        },
      );
  }

  if (!drawSmiles) {
    console.error('SmilesDrawer not loaded! Tried SmiDrawer and SmilesDrawer');
  } else {
    const originalShowTooltip = showTooltip;
    showTooltip = function(idx) {
      originalShowTooltip(idx);

      const smilesCol = columns[smilesColumn];
      if (!smilesCol) { tooltipStructure.classList.add('hidden'); return; }

      const smiles = smilesCol.values[idx];
      if (!smiles || typeof smiles !== 'string' || !smiles.trim()) {
        tooltipStructure.classList.add('hidden');
        return;
      }

      tooltipStructure.classList.remove('hidden');
      structureSvg.innerHTML = '';

      try {
        drawSmiles(smiles);
      } catch (err) {
        console.warn('Failed to render SMILES:', smiles, err);
        tooltipStructure.classList.add('hidden');
      }
    };

    const originalHideTooltip = hideTooltip;
    hideTooltip = function() {
      originalHideTooltip();
      tooltipStructure.classList.add('hidden');
    };

    console.log('SMILES rendering enabled for column:', smilesColumn);

    // Card structure rendering
    cardStack.addEventListener('cardrendered', (e) => {
      const { idx, smilesValue } = e.detail;
      const cardStructure = document.getElementById('card-structure');
      if (!cardStructure) return;

      if (!smilesValue || typeof smilesValue !== 'string' || !smilesValue.trim()) {
        cardStructure.classList.add('hidden');
        return;
      }

      let cardSvg = document.getElementById('card-structure-svg');
      if (!cardSvg) {
        cardSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        cardSvg.id = 'card-structure-svg';
        cardStructure.appendChild(cardSvg);
      }

      cardStructure.classList.remove('hidden');
      cardSvg.innerHTML = '';

      const cardWidthPx = Math.max(120, Math.floor(cardStructure.clientWidth || 216));
      const cardDrawerOptions = { width: cardWidthPx, height: 200, bondThickness: 1.0, compactDrawing: false };

      try {
        if (SmiDrawerCtor) {
          const cardDrawer = new SmiDrawerCtor(cardDrawerOptions);
          cardDrawer.draw(smilesValue, '#card-structure-svg', 'light');
        } else if (SmilesDrawerLib && SmilesDrawerLib.Drawer && SmilesDrawerLib.parse) {
          const cardDrawer = new SmilesDrawerLib.Drawer(cardDrawerOptions);
          SmilesDrawerLib.parse(
            smilesValue,
            (tree) => cardDrawer.draw(tree, 'card-structure-svg', 'light', false),
            (err) => {
              console.warn('Failed to parse SMILES for card:', smilesValue, err);
              cardStructure.classList.add('hidden');
            },
          );
        }
      } catch (err) {
        console.warn('Failed to render SMILES in card:', smilesValue, err);
        cardStructure.classList.add('hidden');
      }
    });
  }
} else if (smilesColumn) {
  console.log('SMILES column specified but not found in columns');
}
